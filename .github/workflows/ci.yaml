name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Resolve commit range
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "from=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
            echo "to=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "from=$PUSH_BEFORE_SHA" >> "$GITHUB_OUTPUT"
            echo "to=$PUSH_HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint commit messages
        env:
          FROM: ${{ steps.range.outputs.from }}
          TO: ${{ steps.range.outputs.to }}
        run: |
          pnpm exec \
            commitlint --from "$FROM" --to "$TO" --verbose

  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Shellcheck
            command: check:shellcheck
          - name: Selene
            command: check:selene
          - name: Zizmor
            command: check:zizmor
          - name: Pinact
            command: check:pinact
          - name: Shfmt
            command: check:shfmt
          - name: Actionlint
            command: check:actionlint
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: ${{ matrix.name }}
        env:
          COMMAND: ${{ matrix.command }}
          GITHUB_TOKEN: ${{ github.token }}
        run: mise run "$COMMAND"

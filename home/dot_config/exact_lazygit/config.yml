# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

gui:
  scrollHeight: 10
  expandFocusedSidePanel: true
  enlargedSideViewLocation: 'top'
  theme:
    activeBorderColor:
      - blue
    inactiveBorderColor:
      - black
    searchingActiveBorderColor:
      - cyan
    optionsTextColor:
      - black
    selectedLineBgColor:
      - black
    inactiveViewSelectedLineBgColor:
      - bold
    cherryPickedCommitFgColor:
      - blue
    cherryPickedCommitBgColor:
      - cyan
    markedBaseCommitFgColor:
      - blue
    markedBaseCommitBgColor:
      - yellow
    unstagedChangesColor:
      - red
    defaultFgColor:
      - default
  showFileTree: false
  nerdFontsVersion: '3'
  commandLogSize: 2
  spinner:
    frames:
      - '⠦'
      - '⠖'
      - '⠲'
      - '⠴'
    rate: 100
  statusPanelView: allBranchesLog

git:
  pagers:
    - colorArg: always
      pager: delta --paging=never
  branchLogCmd: 'git l --color=always'
  allBranchesLogCmds:
    - 'git la --color=always'

os:
  editPreset: 'nvim'

customCommands:
  - key: 'R'
    command: 'gh repo view --web'
    description: 'View repository on GitHub'
    context: 'global'
    loadingText: 'Opening GitHub...'

  - key: 'o'
    command: 'gh pr view --web {{ .SelectedLocalBranch.Name }}'
    description: 'View PR on GitHub'
    context: 'localBranches, remoteBranches'
    loadingText: 'Opening GitHub...'

promptToReturnFromSubprocess: false

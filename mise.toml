[settings]
lockfile = true

[tools]
chezmoi = "2.70.5"
shellcheck = "0.11.0"
"cargo:selene" = "0.31.0"
pinact = "4.1.0"
zizmor = "1.26.1"
shfmt = "3.13.1"
actionlint = "1.7.12"
"pipx:keymap-drawer" = "0.23.0"
taplo = "0.10.0"
node = "26.5.0"
lua-language-server = "3.18.2"
neovim = "0.12.4"

[tasks.check]
depends = [
  "check:shellcheck",
  "check:selene",
  "check:zizmor",
  "check:pinact",
  "check:prettier",
  "check:shfmt",
  "check:taplo",
  "check:actionlint",
  "check:neovim-types",
]

[tasks."check:prettier"]
run = "pnpm exec prettier --check ."

[tasks."check:zizmor"]
run = "zizmor --strict-collection .github/workflows/"

[tasks."check:actionlint"]
run = "actionlint"

[tasks."check:pinact"]
run = "pinact run --check --verify"

[tasks."check:shfmt"]
run = "git ls-files -z '*.sh' '*.zsh' | xargs -0 shfmt --diff"

[tasks."check:taplo"]
run = "taplo format --check"

[tasks."check:selene"]
run = "bash tasks/check/selene.sh"

[tasks."check:shellcheck"]
run = "bash tasks/check/shellcheck.sh"

[tasks."check:neovim-types"]
run = "bash tasks/check/neovim-types.sh"

[tasks."update:pinact"]
run = "pinact run --update"

[tasks."update:zsh-plugins"]
run = "bash tasks/update/zsh-plugins.sh"

[tasks.format]
depends = ["format:prettier", "format:shfmt", "format:taplo"]

[tasks."format:prettier"]
run = "pnpm exec prettier --write --list-different ."

[tasks."format:shfmt"]
run = "git ls-files -z '*.sh' '*.zsh' | xargs -0 shfmt --write"

[tasks."format:taplo"]
run = "taplo format"

[tasks."docs:generate-keyboard-docs"]
run = "node tasks/docs/generate-keyboard-docs.ts"

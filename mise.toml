[settings]
lockfile = true

[task_config]
includes = ["tasks"]

[tools]
chezmoi = "2.70.5"
shellcheck = "0.11.0"
"cargo:selene" = "0.31.0"
pinact = "4.1.0"
zizmor = "1.26.1"
shfmt = "3.13.1"
actionlint = "1.7.12"
"pipx:keymap-drawer" = "0.23.0"
taplo = "0.10.0"
node = "26.5.0"

[tasks.check]
depends = [
  "check:shellcheck",
  "check:selene",
  "check:zizmor",
  "check:pinact",
  "check:prettier",
  "check:shfmt",
  "check:actionlint",
]

[tasks."check:prettier"]
run = "pnpm exec prettier --check ."

[tasks."check:zizmor"]
run = "zizmor --strict-collection .github/workflows/"

[tasks."check:actionlint"]
run = "actionlint"

[tasks."check:pinact"]
run = "pinact run --check --verify"

[tasks."check:shfmt"]
run = "git ls-files -z '*.sh' '*.zsh' | xargs -0 shfmt --diff"

[tasks."update:pinact"]
run = "pinact run --update"

[tasks.format]
depends = ["format:prettier", "format:shfmt"]

[tasks."format:prettier"]
run = "pnpm exec prettier --write --list-different ."

[tasks."format:shfmt"]
run = "git ls-files -z '*.sh' '*.zsh' | xargs -0 shfmt --write"

[tasks."docs:generate-keyboard-docs"]
run = "node tasks/docs/generate-keyboard-docs/main.ts"
